apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: recsys-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
      - name: recommendation-service
        image: nikolayoleynik/recommendation-service:latest
        env:
            - name: MONGO_URL
              value: "mongodb://mongodb.recsys-prod.svc.cluster.local:27017/recsys"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: recsys-prod
spec:
  selector:
    app: recommendation-service
  ports:
  - port: 80
    targetPort: 80