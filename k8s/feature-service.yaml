apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-service
  namespace: recsys-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feature-service
  template:
    metadata:
      labels:
        app: feature-service
    spec:
      containers:
      - name: feature-service
        image: nikolayoleynik/feature-service:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: feature-service
  namespace: recsys-prod
spec:
  selector:
    app: feature-service
  ports:
  - port: 80
    targetPort: 80